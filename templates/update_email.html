<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Email</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: none;
            color: white;
        }

        .form-control {
            border-radius: 12px;
            padding-left: 40px;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 10px;
            color: #555;
        }

        .form-wrapper {
            position: relative;
        }

        .btn-custom {
            border-radius: 50px;
            font-weight: 500;
        }

        .old-email-box {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg rounded-4 p-4">

                <h3 class="text-center mb-4 fw-bold">
                    <i class="fas fa-envelope"></i> Update Email
                </h3>

                <p class="text-center mb-3">User ID: {{ user.id }}</p>

                <!-- Current Email -->
                <div class="mb-3 text-center">
                    <div class="old-email-box">
                        Current Email: <strong>{{ user.email }}</strong>
                    </div>
                </div>

                <!-- Form -->
                <form method="post" action="/update_email/{{ user.id }}">
                    <input type="hidden" name="user_id" value="{{ user.id }}">

                    <div class="mb-3 form-wrapper">
                        <i class="fas fa-at input-icon"></i>
                        <input type="email" name="new_email" class="form-control" placeholder="Enter new email" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button class="btn btn-light btn-custom">
                            <i class="fas fa-save"></i> Update Email
                        </button>
                    </div>
                </form>

                <!-- Back -->
                <div class="text-center mt-3">
                    <a href="/dashboard" class="text-warning fw-bold">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
