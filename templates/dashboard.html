<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            min-height: 100vh;
        }

        .card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
        }

        .avatar {
            width: 90px;
            height: 90px;
            font-size: 35px;
            background: white;
            color: #4e73df;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .btn-custom {
            border-radius: 50px;
            font-weight: 500;
        }

        .btn-custom i {
            margin-right: 8px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card shadow-lg rounded-4 p-4 text-center">

                    <!-- Avatar -->
                    <div class="d-flex justify-content-center mb-3">
                        <div class="avatar">
                            {{ current_user[0].upper() }}
                        </div>
                    </div>

                    <!-- Welcome -->
                    <h3 class="fw-bold">Welcome, {{ current_user }}</h3>
                    <p class="text-light mb-4">Manage your account easily 🚀</p>

                    <!-- Buttons -->
                    <div class="d-grid gap-3">

                        <form method="get" action="/update_email/{{ user_id }}">
                            <button class="btn btn-light btn-custom">
                                <i class="fas fa-envelope"></i> Update Email
                            </button>
                        </form>

                        <form method="post" action="/delete_account/{{ user_id }}">
                            <button class="btn btn-danger btn-custom">
                                <i class="fas fa-trash"></i> Delete Account
                            </button>
                        </form>

                        <form method="post" action="/logout">
                            <button class="btn btn-outline-light btn-custom">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </form>

                        <a href="{{ url_for('fetch_all') }}" class="btn btn-success btn-custom">
                            <i class="fas fa-users"></i> View Users
                        </a>

                    </div>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
